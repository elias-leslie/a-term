# Enable synchronized updates for browser xterm clients such as Terminal's PWA.
set -as terminal-features 'xterm*:sync'

# Use tmux's recommended in-session TERM and advertise RGB support for
# outer xterm-compatible clients separately. This keeps apps inside tmux
# on the more widely compatible tmux-256color path instead of forcing
# direct-color heuristics everywhere.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# Keep per-user overrides outside the repo so this tracked config stays minimal.
if-shell '[ -f ~/.tmux.local.conf ]' 'source-file ~/.tmux.local.conf'
