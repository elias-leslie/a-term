name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: a-term
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d a-term"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/a-term
      A_TERM_BIND_HOST: 127.0.0.1
      A_TERM_AUTH_MODE: none
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install Python dependencies
        run: uv sync --extra dev --frozen

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Run database migrations
        run: uv run alembic upgrade head

      - name: Ruff
        run: uv run dt ruff

      - name: Ty
        run: uv run dt types

      - name: Pytest
        run: uv run dt pytest

      - name: Biome
        run: uv run dt biome

      - name: TypeScript
        run: uv run dt tsc

      - name: Vitest
        run: uv run dt vitest

      - name: Frontend build
        run: pnpm --dir frontend build

      - name: Python build
        run: uv build
